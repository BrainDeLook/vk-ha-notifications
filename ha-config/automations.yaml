# ha-config/automations.yaml
#
# Скопируй это в /config/automations.yaml на своём Home Assistant
# Если используешь папку automations/ — сохрани как vk_notifications.yaml туда
#
# Чтобы добавить ещё одного пользователя — продублируй блок service
# с именем его устройства из Настройки → Интеграции → Мобильное приложение

- id: vk_macrodroid_notification
  alias: "VK: уведомление от MacroDroid"
  description: >
    MacroDroid перехватывает уведомление ВКонтакте на Android
    и отправляет webhook сюда. Пересылаем push на iPhone.
  trigger:
    - platform: webhook
      webhook_id: "vk_new_message"
      allowed_methods:
        - POST
  action:
    - service: notify.iphone_daniil
      data:
        title: >
          {{ trigger.json.title | default("ВКонтакте") }}
        message: >
          {{ trigger.json.text | default("Новое сообщение") }}
        data:
          url: "vkontakte://vk.com/im"
          push:
            sound: default