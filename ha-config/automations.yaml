# ha-config/automations.yaml
# Автоматизация через webhook от аддона (мгновенные уведомления)

- id: vk_webhook_notification
  alias: "VK: мгновенное уведомление через webhook"
  description: "Срабатывает когда аддон VK Notifications получает новое сообщение"
  trigger:
    - platform: webhook
      webhook_id: "vk_new_message"
      allowed_methods:
        - POST
  action:
    - service: notify.mobile_app_iphone
      data:
        title: "ВКонтакте"
        message: >
          {% set sender = trigger.json.sender | default("Новое сообщение") %}
          {% set text = trigger.json.text | default("") %}
          {% if text %}
            {{ sender }}: {{ text }}
          {% else %}
            Новое сообщение от {{ sender }}
          {% endif %}
        data:
          url: "vkontakte://vk.com/im"
          push:
            sound: default