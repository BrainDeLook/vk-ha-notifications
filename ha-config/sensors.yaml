# ha-config/sensors.yaml
# Подключи в configuration.yaml:
#   sensor: !include sensors.yaml

- platform: rest
  name: vk_unread_count
  unique_id: vk_unread_messages
  resource: https://api.vk.com/method/messages.getConversations
  params:
    access_token: !secret vk_access_token
    v: "5.199"
    filter: unread
    count: 1
  value_template: >
    {{ value_json.response.unread_count | default(0) }}
  scan_interval: 30
  json_attributes_path: "$.response"
  json_attributes:
    - unread_count

- platform: rest
  name: vk_last_sender
  unique_id: vk_last_sender
  resource: https://api.vk.com/method/messages.getConversations
  params:
    access_token: !secret vk_access_token
    v: "5.199"
    filter: unread
    count: 1
    extended: 1
  value_template: >
    {% set items = value_json.response.items %}
    {% if items | length > 0 %}
      {% set peer_id = items[0].conversation.peer.id %}
      {% set profiles = value_json.response.profiles | default([]) %}
      {% set profile = profiles | selectattr("id", "equalto", peer_id) | list %}
      {% if profile | length > 0 %}
        {{ profile[0].first_name }} {{ profile[0].last_name }}
      {% else %}
        Новое сообщение
      {% endif %}
    {% else %}
      none
    {% endif %}
  scan_interval: 30